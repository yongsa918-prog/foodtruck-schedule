<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>6월 개인별 스케줄</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{
  --ink:#1a1d24;--muted:#6b7280;--line:#e6e4dd;--paper:#fbf9f4;--card:#fff;
  --t1:#2f5fd6;--t1bg:#eef3fe;--t2:#0e8a6a;--t2bg:#e9f6f0;
  --prep:#9a6a14;--prepbg:#fbf2dc;--cater:#7a3fb0;--caterbg:#f3ebfa;--match:#c2410c;--matchbg:#fdeee5;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"IBM Plex Sans KR",sans-serif;background:var(--paper);color:var(--ink);padding:26px 18px 70px;-webkit-font-smoothing:antialiased}
.wrap{max-width:860px;margin:0 auto}
.h-top{font-family:"Bricolage Grotesque";font-weight:800;font-size:13px;color:var(--muted);letter-spacing:.05em;margin-bottom:2px}
.h-main{font-family:"Bricolage Grotesque";font-weight:800;font-size:30px;letter-spacing:-.02em;margin-bottom:4px}
.h-sub{font-size:13.5px;color:var(--muted);margin-bottom:20px}
.pick-label{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.04em;margin-bottom:8px;text-transform:uppercase}
.picker{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:26px}
.pbtn{font-family:inherit;font-size:14.5px;font-weight:600;border:1.5px solid var(--line);background:#fff;color:var(--ink);
  border-radius:999px;padding:9px 16px;cursor:pointer;transition:.12s;display:flex;align-items:center;gap:7px}
.pbtn:hover{border-color:var(--ink)}
.pbtn .cnt{font-size:11.5px;font-weight:700;color:var(--muted);background:var(--paper);border-radius:999px;padding:1px 7px}
.pbtn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.pbtn.on .cnt{background:rgba(255,255,255,.22);color:#fff}

.person-hd{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:8px}
.person-name{font-family:"Bricolage Grotesque";font-weight:800;font-size:34px;letter-spacing:-.02em;line-height:1}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
.stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:7px 13px;text-align:center}
.stat .n{font-family:"Bricolage Grotesque";font-weight:800;font-size:19px;line-height:1}
.stat .l{font-size:10.5px;color:var(--muted);margin-top:2px}

.daycard{display:flex;gap:16px;padding:18px 4px;border-bottom:1px solid var(--line)}
.daycol{flex:0 0 78px;text-align:center}
.daycol .d{font-family:"Bricolage Grotesque";font-weight:800;font-size:26px;line-height:1}
.daycol .w{font-size:13px;color:var(--muted);font-weight:600;margin-top:3px}
.daycol .w.we{color:var(--match)}
.shifts{flex:1;display:flex;flex-direction:column;gap:10px;min-width:0}
.scard{border-left:4px solid var(--t1);background:var(--t1bg);border-radius:0 12px 12px 0;padding:12px 14px}
.scard.t1{border-color:var(--t1);background:var(--t1bg)} .scard.t2{border-color:var(--t2);background:var(--t2bg)}
.scard.prep{border-color:var(--prep);background:var(--prepbg)} .scard.cater{border-color:var(--cater);background:var(--caterbg)}
.s-top{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:5px}
.badge{font-size:12px;font-weight:700;padding:3px 11px;border-radius:999px;color:#fff}
.badge.t1{background:var(--t1)}.badge.t2{background:var(--t2)}.badge.prep{background:var(--prep)}.badge.cater{background:var(--cater)}
.s-time{font-size:14px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
.s-hrs{font-size:12px;font-weight:700;color:var(--muted);margin-left:auto;background:#fff;border:1px solid var(--line);border-radius:8px;padding:2px 9px}
.s-event{font-size:13.5px;color:var(--ink);font-weight:600;margin-bottom:6px}
.s-mine{display:inline-block;font-size:12.5px;font-weight:700;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:8px;padding:2px 9px;margin-bottom:6px}
.s-with{font-size:13px;color:#374151}
.s-with b{color:var(--muted);font-weight:600;font-size:11.5px}
.s-note{margin-top:7px;font-size:12.5px;color:var(--muted)}
.s-note.match{color:var(--match);font-weight:700;background:var(--matchbg);border-radius:8px;padding:4px 10px;display:inline-block}
.empty{padding:40px 0;text-align:center;color:var(--muted);font-size:14px}
.foot{margin-top:24px;font-size:12px;color:var(--muted);border-top:1px solid var(--line);padding-top:12px;display:flex;gap:16px;flex-wrap:wrap}
.foot b{color:var(--ink)}
@media print{.picker,.pick-label{display:none}body{background:#fff}}
@media (max-width:560px){.daycol{flex-basis:56px}.daycol .d{font-size:22px}.person-name{font-size:26px}}
</style></head>

, "뉴2(재원)", "뉴 캐셔 4~9pm"], "note": "⭐ Aus vs Tur 9pm", "id": "s11"}, {"truck": "1호", "sub": "클로즈", "event": "FIFA PNE", "time": "4pm–9:30pm", "hours": "5.5", "members": ["인한", "니나 11am~7pm", "뉴2(재원)"], "note": "⚽ 캐나다 홈경기 12pm", "id": "s12"}, {"truck": "2호", "sub": "", "event": "Granville Island", "time": "", "hours": "", "members": ["존 (D)", "????"], "note": "", "id": "s13"}]}, "6/13": {"shifts": [{"truck": "1호", "sub": "오픈", "event": "FIFA PNE", "time": "11:30am–5:30pm", "hours": "6.0", "members": ["인한", "니나 12pm~10pm", "뉴2(재원)", "뉴 캐셔 1~8pm"], "note": "⚽ 브라질 vs 모로코", "id": "s14"}, {"truck": "1호", "sub": "클로즈", "event": "FIFA PNE", "time": "5:30pm–10:45pm", "hours": "5.25", "members": ["인한", "니나 12pm~10pm", "뉴2(재원)"], "note": "", "id": "s15"}]}, "6/14": {"shifts": [{"truck": "1호", "sub": "풀데이", "event": "FIFA PNE", "time": "10am–6:45pm", "hours": "8.75", "members": ["인한", "뉴2(재원)", "니나 10am~6pm"], "note": "유명 캐나다 래퍼", "id": "s16"}]}, "6/17": {"shifts": [{"truck": "1호", "sub": "풀데이", "event": "FIFA PNE", "time": "10am–6:45pm", "hours": "8.75", "members": ["인한", "뉴 캐셔 11am~6:30pm", "뉴2(재원)"], "note": "짧은날 → 클로즈팀 풀데이", "id": "s17"}]}, "6/18": {"shifts": [{"truck": "1호", "sub": "오픈", "event": "FIFA PNE", "time": "10am–4pm", "hours": "5.5", "members": ["인한", "니나 10am~4pm", "뉴2(재원)", "뉴 캐셔 1~8pm"], "note": "⭐⭐⭐ Can vs Qatar 3pm+", "id": "s18"}, {"truck": "1호", "sub": "클로즈", "event": "FIFA PNE", "time": "4pm–8:45pm", "hours": "4.45", "members": ["인한", "니나 10am~4pm", "뉴2(재원)", "뉴 캐셔 1~8pm"], "note": "오전 바쁜날 · 캐나다 홈경기", "id": "s19"}, {"truck": "2호", "sub": "", "event": "Surrey Soccer Viewing", "time": "", "hours": "", "members": ["존 (D)", "??", "??"], "note": "", "id": "s20"}]}, "6/19": {"shifts": [{"truck": "1호", "sub": "오픈", "event": "FIFA PNE", "time": "10am–3:30pm", "hours": "5.5", "members": ["인한", "뉴 캐셔 12am~6pm", "뉴2(재원)"], "note": "호주 유명 뮤지션", "id": "s21"}, {"truck": "1호", "sub": "클로즈", "event": "FIFA PNE", "time": "3:30pm–8:45pm", "hours": "5.25", "members": ["인한", "니나 4pm~8:30pm", "뉴2(재원)"], "note": "", "id": "s22"}, {"truck": "2호", "sub": "", "event": "Macneill Secondary School Catering", "time": "", "hours": "", "members": ["존 (D)", "??", "??"], "note": "", "id": "s23"}]}, "6/20": {"shifts": [{"truck": "1호", "sub": "오픈", "event": "FIFA PNE", "time": "11:30am–5:30pm", "hours": "6.0", "members": ["인한", "니나 12pm~10pm", "뉴2(재원)", "뉴 캐셔 1~8pm"], "note": "", "id": "s24"}, {"truck": "1호", "sub": "클로즈", "event": "FIFA PNE", "time": "5:30pm–10:45pm", "hours": "5.25", "members": ["인한", "뉴2(재원)"], "note": "", "id": "s25"}, {"truck": "2호", "sub": "", "event": "Pinoy Festival", "time": "", "hours": "", "members": ["존 (D)", "??", "??"], "note": "", "id": "s26"}]}, "6/21": {"shifts": [{"truck": "1호", "sub": "오픈", "event": "FIFA PNE", "time": "10am–4pm", "hours": "6.0", "members": ["인한", "니나 10am~8pm", "뉴2(재원)", "뉴 캐셔 11pm~6pm"], "note": "⭐ NZ vs Egy 6pm", "id": "s27"}, {"truck": "1호", "sub": "클로즈", "event": "FIFA PNE", "time": "4pm–8:45pm", "hours": "4.45", "members": ["인한", "니나 10am~8pm", "뉴2(재원)"], "note": "", "id": "s28"}, {"truck": "2호", "sub": "", "event": "Pinoy Festival", "time": "", "hours": "", "members": ["존 (D)", "??", "??"], "note": "", "id": "s29"}]}, "6/24": {"shifts": [{"truck": "1호", "sub": "오픈", "event": "FIFA PNE", "time": "10am–3:30pm", "hours": "5.5", "members": ["인한", "니나", "뉴2(재원)", "뉴 캐셔"], "note": "⭐⭐⭐ Can vs Switz 12pm", "id": "s30"}, {"truck": "1호", "sub": "클로즈", "event": "FIFA PNE", "time": "3:30pm–8:45pm", "hours": "5.25", "members": ["인한", "니나", "뉴2(재원)", "뉴 캐셔"], "note": "밴쿠버 출신 유명 뮤지션 (4명 이상)", "id": "s31"}, {"truck": "2호", "sub": "", "event": "Seaspan Shipyards", "time": "", "hours": "", "members": ["존", "션", "??"], "note": "", "id": "s32"}]}, "6/25": {"shifts": [{"truck": "1호", "sub": "오픈", "event": "FIFA PNE", "time": "11am–4:30pm", "hours": "5.5", "members": ["인한", "니나", "뉴2(재원)"], "note": "유명 캐나다 록밴드", "id": "s33"}, {"truck": "1호", "sub": "클로즈", "event": "FIFA PNE", "time": "4:30pm–9:45pm", "hours": "5.25", "members": ["인한", "니나", "뉴3"], "note": "", "id": "s34"}, {"truck": "2호", "sub": "", "event": "Catering 170", "time": "", "hours": "", "members": ["션", "존", "첸", "??"], "note": "뉴2(키친) 지원", "id": "s35"}]}, "6/26": {"shifts": [{"truck": "1호", "sub": "오픈", "event": "FIFA PNE", "time": "12pm–5:30pm", "hours": "5.5", "members": ["인한"], "note": "⭐ NZ vs Belg 8pm", "id": "s36"}, {"truck": "1호", "sub": "클로즈", "event": "FIFA PNE", "time": "5:30pm–10:45pm", "hours": "5.25", "members": ["인한"], "note": "", "id": "s37"}]}, "6/27": {"shifts": [{"truck": "1호", "sub": "오픈", "event": "FIFA PNE", "time": "11am–4:30pm", "hours": "5.5", "members": ["인한", "소피아"], "note": "소피아 = 뉴1 대체", "id": "s38"}, {"truck": "1호", "sub": "클로즈", "event": "FIFA PNE", "time": "4:30pm–10pm", "hours": "5.5", "members": ["뉴1"], "note": "", "id": "s39"}, {"truck": "2호", "sub": "", "event": "Golden Spike Days", "time": "", "hours": "", "members": ["존 (D)", "??", "??"], "note": "", "id": "s40"}]}, "6/28": {"shifts": [{"truck": "1호", "sub": "풀데이", "event": "FIFA PNE", "time": "10am–4:15pm", "hours": "6.25", "members": ["인한", "뉴1", "뉴4", "뉴2"], "note": "짧은날 → 오픈팀 풀데이 (O/T +60분 가능)", "id": "s41"}, {"truck": "2호", "sub": "", "event": "Golden Spike Days", "time": "", "hours": "", "members": ["존 (D)", "??", "??"], "note": "", "id": "s42"}]}}};
const PEOPLE = [{"key": "인한", "label": "인한", "tokens": ["인한"]}, {"key": "존", "label": "존", "tokens": ["존"]}, {"key": "니나", "label": "니나", "tokens": ["니나"]}, {"key": "재원", "label": "재원 (뉴2)", "tokens": ["재원", "뉴2"]}, {"key": "첸", "label": "첸", "tokens": ["첸"]}, {"key": "션", "label": "션", "tokens": ["션"]}, {"key": "에이미", "label": "에이미", "tokens": ["에이미"]}, {"key": "소피아", "label": "소피아", "tokens": ["소피아"]}, {"key": "뉴캐셔", "label": "뉴 캐셔(신입)", "tokens": ["뉴 캐셔", "뉴캐셔"]}, {"key": "뉴1", "label": "뉴1", "tokens": ["뉴1"]}, {"key": "뉴3", "label": "뉴3", "tokens": ["뉴3"]}, {"key": "뉴4", "label": "뉴4", "tokens": ["뉴4"]}, {"key": "미정", "label": "미정 (??)", "tokens": ["??", "????"]}];
const DOW=["일","월","화","수","목","금","토"];
function dateObj(key){const[m,d]=key.split("/").map(Number);const yr=(m===5)?2026:2026;return new Date(yr,m-1,d);}
function dow(key){return DOW[dateObj(key).getDay()];}
function tcls(t){return{"1호":"t1","2호":"t2","프랩":"prep","케이터링":"cater"}[t]||"prep";}
function esc(s){return(s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

// sorted date keys
const keys=Object.keys(SCHEDULE.days).sort((a,b)=>dateObj(a)-dateObj(b));

function matchedMember(shift,tokens){
  for(const m of (shift.members||[])){ for(const t of tokens){ if(m.includes(t)) return m; } }
  return null;
}
function personShifts(p){
  const out=[];
  for(const k of keys){
    for(const s of SCHEDULE.days[k].shifts){
      const mm=matchedMember(s,p.tokens);
      if(mm) out.push({key:k,shift:s,mine:mm});
    }
  }
  return out;
}
function countFor(p){return personShifts(p).length;}

function renderPicker(sel){
  document.getElementById("picker").innerHTML = PEOPLE.map(p=>{
    const c=countFor(p);
    if(c===0) return "";
    return `<button class="pbtn ${p.key===sel?'on':''}" data-k="${p.key}">${esc(p.label)}<span class="cnt">${c}</span></button>`;
  }).join("");
  document.querySelectorAll(".pbtn").forEach(b=>b.addEventListener("click",()=>select(b.dataset.k)));
}

function personalNote(mine,nameTokens){
  // strip the name token + tidy => personal time / role
  let t=mine;
  for(const tk of nameTokens){ t=t.split(tk).join(""); }
  t=t.replace(/^[()\s·,]+|[()\s·,]+$/g,"").trim();
  if(/\bor\b|or /.test(mine)) return "미정 후보";
  if(mine.includes("(D)")||mine.startsWith("존")&&mine.includes("D")) {}
  if(mine.includes("(D)")) return "운전 (D)";
  return t;
}

function select(key){
  const p=PEOPLE.find(x=>x.key===key);
  renderPicker(key);
  const list=personShifts(p);
  // stats
  const dayset=new Set(list.map(x=>x.key));
  let hours=0; list.forEach(x=>{const h=parseFloat(x.shift.hours);if(!isNaN(h))hours+=h;});
  let html=`<div class="person-hd"><div class="person-name">${esc(p.label)}</div>
    <div class="stats">
      <div class="stat"><div class="n">${dayset.size}</div><div class="l">근무일</div></div>
      <div class="stat"><div class="n">${list.length}</div><div class="l">시프트</div></div>
      <div class="stat"><div class="n">${hours? (Math.round(hours*10)/10):'–'}</div><div class="l">예상 시간</div></div>
    </div></div>`;
  if(!list.length){ html+=`<div class="empty">이 사람의 배정된 시프트가 없어요.</div>`; document.getElementById("view").innerHTML=html; return; }
  // group by day
  let curr=null;
  for(const it of list){
    const s=it.shift; const note=s.note||""; const ismatch=note.includes("⚽")||note.includes("⭐");
    const others=(s.members||[]).filter(m=>m!==it.mine);
    const mineNote=personalNote(it.mine,p.tokens);
    if(it.key!==curr){
      if(curr!==null) html+=`</div></div>`;
      const w=dow(it.key); const we=(w==="일"||w==="토");
      html+=`<div class="daycard"><div class="daycol"><div class="d">${esc(it.key)}</div><div class="w ${we?'we':''}">${w}</div></div><div class="shifts">`;
      curr=it.key;
    }
    const sub=s.sub?(" "+s.sub):"";
    html+=`<div class="scard ${tcls(s.truck)}">
      <div class="s-top"><span class="badge ${tcls(s.truck)}">${esc(s.truck+sub)}</span>
        ${s.time?`<span class="s-time">${esc(s.time)}</span>`:''}
        ${s.hours?`<span class="s-hrs">${esc(s.hours)}h</span>`:''}</div>
      ${s.event?`<div class="s-event">${esc(s.event)}</div>`:''}
      ${mineNote?`<div class="s-mine">내 시간/역할: ${esc(mineNote)}</div>`:''}
      ${others.length?`<div class="s-with"><b>함께</b> ${esc(others.join(", "))}</div>`:'<div class="s-with"><b>함께</b> —</div>'}
      ${note?`<div class="s-note ${ismatch?'match':''}">${esc(note)}</div>`:''}
    </div>`;
  }
  html+=`</div></div>`;
  document.getElementById("view").innerHTML=html;
}
renderPicker("인한"); select("인한");
</script></body></html>
